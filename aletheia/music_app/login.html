<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SoundWave</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="form-page">
    <div class="container form-container">
        <h1>Welcome Back</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
            <p class="form-switch">Don't have an account? <a href="register.html">Register</a></p>
        </form>
    </div>

    <script>
        // This simple script simulates a login by redirecting to the main app.
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevents the form from actually submitting
            // In a real app, you'd verify credentials here.
            localStorage.setItem('isLoggedIn', 'true'); // Simulate a login session
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
